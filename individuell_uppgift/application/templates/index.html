{% extends "layout.html" %}
{% block title %}Elpriser{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="text-center mb-4">Kolla elpriser för specifik dag</h2>

                    <form action="/priser" method="post">
                        <div class="mb-3">
                            <label for="year" class="form-label">År</label>
                            <input type="text" id="year" name="year" class="form-control" placeholder="t.ex. 2024">
                        </div>

                        <div class="mb-3">
                            <label for="month" class="form-label">Månad</label>
                            <input type="text" id="month" name="month" class="form-control" placeholder="1–12">
                        </div>

                        <div class="mb-3">
                            <label for="day" class="form-label">Dag</label>
                            <input type="text" id="day" name="day" class="form-control" placeholder="1–31">
                        </div>

                        <div class="mb-3">
                            <label for="area" class="form-label">Prisområde (SE1–SE4)</label>
                            <input type="text" id="area" name="area" class="form-control" placeholder="SE1, SE2, SE3 eller SE4">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Visa priser</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
